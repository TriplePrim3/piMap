<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Place in Pi — Find Your Place in π</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>π</text></svg>">
</head>
<body>
  <canvas id="digitCanvas"></canvas>

  <!-- Top Bar -->
  <header id="topBar">
    <div class="logo">
      <svg class="logo-p" viewBox="0 0 22 28" width="18" height="23" fill="none">
        <circle cx="11" cy="9" r="7" stroke="url(#logoGrad)" stroke-width="2.5" fill="none"/>
        <line x1="6.5" y1="15" x2="6.5" y2="27" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="22" y2="28" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#7c6ff7"/>
            <stop offset="100%" stop-color="#ff6b9d"/>
          </linearGradient>
        </defs>
      </svg><span class="logo-text">lace in</span>
      <span class="logo-symbol">π</span>
    </div>

    <div class="constant-selector">
      <button class="const-btn active" data-constant="pi">π</button>
      <button class="const-btn" data-constant="e">e</button>
      <button class="const-btn" data-constant="sqrt2">√2</button>
      <button class="const-btn" data-constant="sqrt3">√3</button>
      <button id="muteBtn" class="panel-toggle" title="Toggle sound">
        <svg id="muteIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path id="muteSoundWaves" d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/>
        </svg>
      </button>
      <button id="panelToggle" class="panel-toggle" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>

    <div class="search-container">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search digits, words, or #N to go to digit..." autocomplete="off" maxlength="20" title="Type digits to search, letters to encode, or #100 to jump to the 100th digit">
        <span id="searchResults" class="search-results-badge hidden"></span>
      </div>
      <div id="searchEncoding" class="search-encoding hidden">
        <label class="enc-pill" data-enc="alpha26"><input type="radio" name="searchEnc" value="alpha26" checked><span>Alpha-26</span><button class="enc-info" data-enc-info="alpha26">i</button></label>
        <label class="enc-pill" data-enc="compact"><input type="radio" name="searchEnc" value="compact"><span>Compact</span><button class="enc-info" data-enc-info="compact">i</button></label>
        <label class="enc-pill" data-enc="t9"><input type="radio" name="searchEnc" value="t9"><span>T9</span><button class="enc-info" data-enc-info="t9">i</button></label>
        <label class="chunk-toggle" title="Find word in multiple parts within π">
          <input type="checkbox" id="chunkSearch">
          <span>Multi-Part</span>
        </label>
      </div>
      <div class="search-nav hidden" id="searchNav">
        <button id="prevMatch" class="nav-btn" title="Previous match">&#9650;</button>
        <span id="matchIndex">0/0</span>
        <button id="nextMatch" class="nav-btn" title="Next match">&#9660;</button>
      </div>
    </div>

    <!-- Right-side top bar items -->
    <div class="topbar-right">
      <div id="famousPanel" class="famous-panel">
        <button class="famous-panel-header" id="famousToggle">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>
          <span>Famous in π</span>
          <svg class="famous-chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div id="famousPatterns" class="famous-list"></div>
      </div>
      <button id="achievementsBtn" class="achievements-btn" title="Achievements">
        <span class="achievements-icon">🏆</span>
        <span id="achievementsCount" class="achievements-count">0</span>
      </button>
      <button id="shopBtn" class="shop-open-btn" title="Shop — Your Place in π">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span>Shop</span>
      </button>
    </div>

  </header>

  <!-- Mobile bottom navigation bar (hidden on desktop) -->
  <nav id="mobileBottomNav" class="mobile-bottom-nav">
    <button class="mobile-nav-item" data-action="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </button>
    <button class="mobile-nav-item" data-action="famous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>
      <span>Famous</span>
    </button>
    <button class="mobile-nav-item" data-action="shop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span>Shop</span>
    </button>
    <button class="mobile-nav-item" data-action="more">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      <span>More</span>
    </button>
  </nav>

  <!-- Mobile drawer (hidden on desktop) -->
  <div id="mobileDrawer" class="mobile-drawer hidden">
    <div class="mobile-drawer-backdrop"></div>
    <div class="mobile-drawer-panel">
      <div class="mobile-drawer-header">
        <span>Menu</span>
        <button id="mobileDrawerClose" class="mobile-drawer-close">&times;</button>
      </div>
      <div class="mobile-drawer-items"></div>
    </div>
  </div>

  <!-- Mobile famous overlay (hidden on desktop) -->
  <div id="mobileFamousOverlay" class="mobile-famous-overlay hidden">
    <div class="mobile-famous-sheet">
      <div class="mobile-famous-header">
        <span>Famous in π</span>
        <button class="mobile-famous-close" id="mobileFamousClose">&times;</button>
      </div>
      <div id="mobileFamousList" class="famous-list"></div>
    </div>
  </div>

  <!-- Translation Display (floating below top bar) -->
  <div id="searchConversion" class="search-conversion hidden"></div>

  <!-- Settings Dropdown (anchored to gear icon in constant-selector) -->
  <div id="settingsDropdown" class="settings-dropdown hidden">
    <h3>Display</h3>
    <div class="option-group">
      <label class="radio-label" title="Raw digits of the constant">
        <input type="radio" name="mapping" value="digits" checked> Numbers
        <span class="tooltip-icon" data-tip="Shows each digit (0-9) of the constant">?</span>
      </label>
      <label class="radio-label" title="Each digit shown as a colored block">
        <input type="radio" name="mapping" value="blocks"> Color Blocks
        <span class="tooltip-icon" data-tip="Each digit (0-9) is shown as a uniquely colored square">?</span>
      </label>
      <label class="radio-label" title="Digits encoded as Braille patterns">
        <input type="radio" name="mapping" value="braille"> Braille
        <span class="tooltip-icon" data-tip="Each digit is encoded as a Braille character">?</span>
      </label>
    </div>

    <h3>Layout</h3>
    <div class="option-group">
      <label class="radio-label" title="Standard left-to-right grid of digits">
        <input type="radio" name="layout" value="grid"> Grid
      </label>
      <label class="radio-label" title="Digits spiral outward from the center">
        <input type="radio" name="layout" value="spiral" checked> Spiral
      </label>
      <label class="radio-label" title="Horizontal strip with magnification">
        <input type="radio" name="layout" value="wave"> Line
      </label>
    </div>

    <h3>Theme</h3>
    <div class="option-group">
      <label class="radio-label">
        <input type="radio" name="theme" value="dark" checked> Dark
      </label>
      <label class="radio-label">
        <input type="radio" name="theme" value="light"> Light
      </label>
    </div>

  </div>

  <!-- Minimap (bird's eye scale bar) -->
  <div id="minimapContainer">
    <canvas id="minimapCanvas"></canvas>
  </div>

  <!-- Info Bar -->
  <footer id="infoBar">
    <span id="digitPosition">Digit #0</span>
    <span id="totalDigits">of 1,000,000</span>
    <span id="zoomLevel">Zoom: 1.0x</span>
  </footer>

  <!-- API Search Result Panel (expanded, bottom overlay) -->
  <div id="apiResultBanner" class="api-banner hidden">
    <div class="api-banner-content">
      <span id="apiResultIcon" class="api-icon"></span>
      <div class="api-text">
        <div id="apiResultTitle" class="api-title"></div>
        <div id="apiResultDetail" class="api-detail"></div>
      </div>
      <button id="apiResultClose" class="api-close">&times;</button>
    </div>
    <div id="apiContextPanel" class="api-context-panel hidden">
      <div class="api-scale-bar">
        <div class="scale-track">
          <div id="scaleLocal" class="scale-local"></div>
          <div id="scaleTicks" class="scale-ticks"></div>
          <div id="scalePin" class="scale-pin"></div>
        </div>
        <div class="scale-labels">
          <span>0</span>
          <span id="scaleTotalLabel">1B</span>
        </div>
      </div>
      <div id="apiContextStrip" class="api-context-strip"></div>
    </div>
  </div>

  <!-- π Mascot -->
  <div id="piMascot" class="pi-mascot">
    <div id="mascotBubble" class="mascot-bubble hidden"></div>
    <div class="mascot-body" id="mascotBody">
      <svg viewBox="0 0 52 52" width="72" height="72" class="mascot-face">
        <!-- π symbol -->
        <text x="26" y="38" text-anchor="middle" font-size="30" font-weight="700" fill="#fff" font-family="system-ui">π</text>
        <!-- Eyes -->
        <g class="mascot-eyes">
          <circle cx="17" cy="16" r="5" fill="#fff"/>
          <circle cx="35" cy="16" r="5" fill="#fff"/>
          <circle id="mascotPupilL" cx="17" cy="16" r="2.5" fill="#1a1a2e"/>
          <circle id="mascotPupilR" cx="35" cy="16" r="2.5" fill="#1a1a2e"/>
        </g>
      </svg>
    </div>
  </div>

  <!-- Achievements Panel -->
  <div id="achievementsPanel" class="achievements-panel hidden">
    <div class="achievements-header">
      <span>🏆 Achievements</span>
      <button id="achievementsClose" class="achievements-close">&times;</button>
    </div>
    <div id="achievementsList" class="achievements-list"></div>
  </div>

  <!-- Shop Modal -->
  <div id="shopModal" class="shop-modal hidden">
    <div class="shop-modal-content">
      <button id="shopModalClose" class="shop-close">&times;</button>
      <h2 class="shop-title">Your Place in π</h2>
      <p class="shop-subtitle">Your unique position in π — wear it.</p>

      <!-- In-shop search -->
      <div class="shop-search">
        <input type="text" id="shopSearchInput" class="shop-search-input" placeholder="Type a name or word…" maxlength="20" autocomplete="off">
        <button id="shopSearchBtn" class="shop-search-btn">Generate</button>
      </div>
      <div id="shopSearchStatus" class="shop-search-status hidden"></div>

      <!-- Product picker -->
      <div class="shop-control-group" style="margin-bottom:12px">
        <span class="shop-label">Product</span>
        <div id="productPicker" class="shop-pill-row"></div>
      </div>

      <!-- Front / Back mockup frames -->
      <div class="shop-frames">
        <div class="shop-frame">
          <div class="shop-frame-label" id="frameLabelLeft">FRONT</div>
          <div class="shop-frame-canvas" id="frameFront"></div>
        </div>
        <div class="shop-frame" id="shopFrameBack">
          <div class="shop-frame-label" id="frameLabelRight">BACK</div>
          <div class="shop-frame-canvas" id="frameBack"></div>
        </div>
      </div>

      <!-- Pi vicinity strip -->
      <div id="piVicinityStrip" class="pi-vicinity-strip hidden"></div>

      <!-- Customization panel -->
      <div class="shop-customize">
        <div class="shop-section-title">Customization</div>
        <div class="shop-option-grid">
          <!-- Row: Design + Flip -->
          <div class="shop-option-row" id="backDesignGroup">
            <span class="shop-option-label">Back Design</span>
            <div class="shop-option-value">
              <div id="backDesignPicker" class="shop-pill-row"></div>
              <button id="shopFlip" class="shop-flip-btn-sm" title="Swap front and back designs">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
                Flip
              </button>
            </div>
          </div>
          <!-- Row: Cap design -->
          <div class="shop-option-row hidden" id="capDesignGroup">
            <span class="shop-option-label">Design</span>
            <div class="shop-option-value">
              <div id="capDesignPicker" class="shop-pill-row"></div>
            </div>
          </div>
          <!-- Row: Encoding -->
          <div class="shop-option-row hidden" id="shopEncodingGroup">
            <span class="shop-option-label">Encoding</span>
            <div class="shop-option-value">
              <div id="shopEncodingPicker" class="shop-pill-row"></div>
            </div>
          </div>
          <!-- Row: Palette -->
          <div class="shop-option-row" id="shopPaletteGroup">
            <span class="shop-option-label">Palette</span>
            <div class="shop-option-value">
              <div id="shopPalettePicker" class="shop-palette-row"></div>
            </div>
          </div>
          <!-- Row: Shirt Color -->
          <div class="shop-option-row">
            <span class="shop-option-label">Shirt</span>
            <div class="shop-option-value">
              <div id="shirtColorPicker" class="shop-color-row"></div>
            </div>
          </div>
          <!-- Row: Text Color -->
          <div class="shop-option-row">
            <span class="shop-option-label">Text</span>
            <div class="shop-option-value">
              <div id="textColorPicker" class="shop-color-row"></div>
            </div>
          </div>
          <!-- Row: Size -->
          <div class="shop-option-row">
            <span class="shop-option-label">Size</span>
            <div class="shop-option-value">
              <div id="sizePicker" class="shop-pill-row"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="shop-actions">
        <div class="shop-price-tag">$31.41</div>
        <button id="shopAddCart" class="shop-btn shop-btn-primary">Add to Cart</button>
      </div>

      <!-- Cart -->
      <div id="shopCart" class="shop-cart">
        <div class="shop-cart-header">
          <span class="shop-label">Cart</span>
          <span id="cartCount" class="shop-cart-count">0</span>
        </div>
        <div id="cartItems" class="shop-cart-items"></div>
        <button id="shopCheckout" class="shop-btn shop-btn-primary shop-checkout-btn" disabled>
          Checkout
        </button>
      </div>
    </div>
  </div>

  <!-- Digit Tooltip -->
  <div id="digitTooltip" class="digit-tooltip hidden"></div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay">
    <div class="loader">
      <span class="loader-symbol">π</span>
      <p>Loading digits...</p>
    </div>
  </div>

  <script src="js/constants.js?v=17"></script>
  <script src="js/dataLoader.js?v=17"></script>
  <script src="js/mappings.js?v=17"></script>
  <script src="js/layout.js?v=17"></script>
  <script src="js/camera.js?v=17"></script>
  <script src="js/search.js?v=17"></script>
  <script src="js/piApi.js?v=17"></script>
  <script src="js/particles.js?v=17"></script>
  <script src="js/sounds.js?v=17"></script>
  <script src="js/renderer.js?v=17"></script>
  <script src="js/minimap.js?v=18"></script>
  <script src="js/shop.js?v=20"></script>
  <script src="js/ui.js?v=20"></script>
  <script src="js/app.js?v=17"></script>
</body>
</html>
